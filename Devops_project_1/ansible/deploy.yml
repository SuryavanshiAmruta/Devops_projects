---
- hosts: application
  become: yes

  tasks:

    - name: Pull Docker Image
      shell: docker pull suryavanshiamruta/jenkins-cicd-demo:latest

    - name: Remove Existing Container
      shell: docker rm -f calculator || true

    - name: Run Docker Container
      shell: |
        docker run -d \
        --name calculator \
        -p 8080:8080 \
        suryavanshiamruta/jenkins-cicd-demo:latest
